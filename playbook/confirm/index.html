<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email - cmul8</title>
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafb;
      --text-dark: #1a1a1a;
      --text-gray: #888;
      --text-light: #ededed;
      --accent: #1a1a1a;
      --white: #fff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .nav {
      display: flex;
      justify-content: center;
      padding: 1.5rem 2rem;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--text-dark);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-icon {
      opacity: 0.8;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
    }

    .email-icon {
      width: 72px;
      height: 72px;
      margin-bottom: 2rem;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .email-icon svg {
      width: 32px;
      height: 32px;
      color: var(--text-dark);
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--text-gray);
      max-width: 400px;
      margin-bottom: 2rem;
    }

    .email-highlight {
      display: inline-block;
      background: var(--white);
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 500;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .steps {
      text-align: left;
      background: var(--white);
      padding: 1.5rem 2rem;
      border-radius: 0.75rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      max-width: 360px;
    }

    .steps h3 {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-gray);
      margin-bottom: 1rem;
    }

    .step {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .step:last-child {
      margin-bottom: 0;
    }

    .step-number {
      width: 24px;
      height: 24px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    .step-text {
      font-size: 0.9375rem;
      color: var(--text-dark);
      padding-top: 2px;
    }

    .back-link {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--text-gray);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--text-dark);
    }

    .footer {
      padding: 2rem;
      text-align: center;
    }

    .footer-copy {
      font-size: 0.875rem;
      color: var(--text-gray);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-logo">
      <svg class="nav-icon" width="28" height="16" viewBox="0 0 28 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M7 8c0-2.5 2-4.5 4.5-4.5S16 5.5 16 8s-2 4.5-4.5 4.5S7 10.5 7 8z"/>
        <path d="M12 8c0-2.5 2-4.5 4.5-4.5S21 5.5 21 8s-2 4.5-4.5 4.5S12 10.5 12 8z"/>
        <line x1="1" y1="8" x2="27" y2="8" stroke-width="1" stroke-dasharray="2 2"/>
        <polygon points="25,6 27,8 25,10" fill="currentColor" stroke="none"/>
      </svg>
      cmul8
    </a>
  </nav>

  <main>
    <div class="email-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 6l-10 7L2 6"/>
      </svg>
    </div>

    <h1>Check your email</h1>
    <p class="subtitle">We've sent a confirmation link to verify your email address.</p>

    <div class="steps">
      <h3>Next steps</h3>
      <div class="step">
        <span class="step-number">1</span>
        <span class="step-text">Open the email from cmul8</span>
      </div>
      <div class="step">
        <span class="step-number">2</span>
        <span class="step-text">Click the confirmation link</span>
      </div>
      <div class="step">
        <span class="step-number">3</span>
        <span class="step-text">Download your playbook</span>
      </div>
    </div>

    <a href="/playbook" class="back-link">Didn't receive it? Try again</a>
  </main>

  <footer class="footer">
    <span class="footer-copy">&copy; 2026 cmul8</span>
  </footer>
</body>
</html>
