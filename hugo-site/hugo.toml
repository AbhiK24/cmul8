baseURL = 'https://www.cmul8.com/'
languageCode = 'en-us'
title = 'cmul8 - AI That Understands How Humans Decide'
theme = 'worksim'

# SEO Settings
enableRobotsTXT = true
canonifyURLs = true

[params]
  description = "We capture human reasoning at scale—data that doesn't exist anywhere else—to build AI that predicts what people will really do, not just what they say."
  author = "cmul8"
  appUrl = "https://cmul8.work"

  # Open Graph / Social
  images = ["/images/og-default.png"]

  # GEO/SEO
  keywords = ["consumer research", "AI simulation", "reasoning models", "behavioral prediction", "hiring assessment", "synthetic populations"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    name = "Products"
    url = "/#products"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2

[permalinks]
  blog = "/blog/:slug/"

# Build settings
[build]
  writeStats = true
