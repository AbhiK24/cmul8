<header class="header">
  <nav class="nav">
    <a href="/" class="nav-logo">
      <svg class="nav-icon" width="28" height="16" viewBox="0 0 28 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M7 8c0-2.5 2-4.5 4.5-4.5S16 5.5 16 8s-2 4.5-4.5 4.5S7 10.5 7 8z"/>
        <path d="M12 8c0-2.5 2-4.5 4.5-4.5S21 5.5 21 8s-2 4.5-4.5 4.5S12 10.5 12 8z"/>
        <line x1="1" y1="8" x2="27" y2="8" stroke-width="1" stroke-dasharray="2 2"/>
        <polygon points="25,6 27,8 25,10" fill="currentColor" stroke="none"/>
      </svg>
      <span>cmul8</span>
    </a>

    <div class="nav-links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>

    <div class="nav-actions">
      <a href="/blog/" class="nav-cta">Read Blog</a>
    </div>

    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}" class="mobile-link">{{ .Name }}</a>
    {{ end }}
  </div>
</header>
